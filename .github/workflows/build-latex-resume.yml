name: Build LaTeX Resume

on:
  push:
    branches: [main]
    paths:
      - 'LaTeX/**'
      - '.github/workflows/build-latex-resume.yml'
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-latex:
    runs-on: ubuntu-latest

    # Grant write permissions to push generated PDF
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile English resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume-en.tex
          working_directory: LaTeX
          latexmk_use_lualatex: false
          latexmk_shell_escape: false

      - name: Compile Portuguese resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume-pt.tex
          working_directory: LaTeX
          latexmk_use_lualatex: false
          latexmk_shell_escape: false

      - name: Copy PDFs to PDF folder
        run: |
          mkdir -p PDF
          cp LaTeX/resume-en.pdf "PDF/Luann_Luna_Resume_EN.pdf"
          cp LaTeX/resume-pt.pdf "PDF/Luann_Luna_Resume_PT.pdf"

      - name: Commit and push PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "PDF/Luann_Luna_Resume_EN.pdf" "PDF/Luann_Luna_Resume_PT.pdf"
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update resume PDFs from LaTeX source (EN + PT)" && git push)
