<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luann Luna | Senior iOS Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0071e3; /* Apple Blue */
            --bg-gradient: linear-gradient(135deg, #f5f5f7 0%, #d2d2d7 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1d1d1f;
            --text-dim: #86868b;
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient: linear-gradient(135deg, #000000 0%, #1d1d1f 100%);
                --card-bg: rgba(28, 28, 30, 0.8);
                --text-main: #f5f5f7;
                --text-dim: #a1a1a6;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-icon {
            width: 80px;
            height: 80px;
            background: var(--primary);
            margin: 0 auto 24px;
            border-radius: 18px; /* App icon curvature */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0, 113, 227, 0.3);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--primary);
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .selection-text {
            color: var(--text-dim);
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        .language-buttons {
            display: grid;
            gap: 16px;
            margin-bottom: 40px;
        }

        .resume-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: var(--text-main);
            color: var(--card-bg);
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .resume-link:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .resume-link.pt {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-dim);
        }

        .resume-link.pt:hover {
            background: rgba(134, 134, 139, 0.1);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding-top: 30px;
            border-top: 1px solid rgba(134, 134, 139, 0.2);
        }

        .social-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .social-links a:hover {
            color: var(--primary);
        }

        .flag { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-icon">LL</div>
        
        <h1>Luann Luna</h1>
        <h2>Senior iOS Engineer</h2>

        <p class="selection-text">Select your preferred language</p>

        <div class="language-buttons">
            <a class="resume-link en" href="PDF/Luann_Luna_Resume_EN.pdf" target="_blank">
                <span class="flag">🇺🇸</span>
                <span>Resume in English</span>
            </a>
            <a class="resume-link pt" href="PDF/Luann_Luna_Resume_PT.pdf" target="_blank">
                <span class="flag">🇧🇷</span>
                <span>Currículo em Português</span>
            </a>
        </div>

        <div class="social-links">
            <a href="https://linkedin.com/in/luannluna" target="_blank">LinkedIn</a>
            <a href="https://github.com/LuannLuna" target="_blank">GitHub</a>
            <a href="mailto:your-email@example.com">Contact</a>
        </div>
    </div>

</body>
</html>
